<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台股收盤價查詢</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

    :root {
      --bg: #0a0e14;
      --surface: #111620;
      --surface2: #171d2a;
      --border: #1e2a3a;
      --accent: #00d4aa;
      --accent2: #0099ff;
      --danger: #ff4d6d;
      --warn: #ffb340;
      --text: #e2e8f0;
      --muted: #64748b;
      --dim: #94a3b8;
      --green: #22c55e;
      --red: #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 28px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: .05em;
      color: var(--accent);
    }

    .sub {
      font-size: 12px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .date-badge {
      margin-left: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--dim);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 4px;
    }

    .layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .ph {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }

    textarea {
      width: 100%;
      height: 320px;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.8;
      padding: 14px 16px;
      resize: none;
    }

    textarea::placeholder {
      color: var(--muted);
    }

    .ifooter {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .cnt {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    .cnt span {
      color: var(--accent);
      font-weight: 600;
    }

    .btn {
      padding: 8px 18px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 13px;
      font-weight: 500;
      transition: all .15s;
    }

    .btn-p {
      background: var(--accent);
      color: #0a0e14;
    }

    .btn-p:hover {
      background: #00f0c0;
      transform: translateY(-1px);
    }

    .btn-p:disabled {
      opacity: .4;
      cursor: not-allowed;
      transform: none;
    }

    .btn-g {
      background: transparent;
      color: var(--dim);
      border: 1px solid var(--border);
      font-size: 12px;
      padding: 6px 12px;
    }

    .btn-g:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .rp {
      min-height: 420px;
    }

    .sbar {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 38px;
    }

    .spin {
      width: 12px;
      height: 12px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      padding: 8px 14px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: left;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }

    th.r {
      text-align: right;
    }

    td {
      padding: 9px 14px;
      font-size: 13px;
      border-bottom: 1px solid rgba(30, 42, 58, .6);
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background: rgba(0, 212, 170, .03);
    }

    .code {
      font-family: 'JetBrains Mono', monospace;
      color: var(--dim);
      font-size: 12px;
    }

    .price {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 600;
      text-align: right;
    }

    .chg {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      text-align: right;
    }

    .up {
      color: var(--red);
    }

    .down {
      color: var(--green);
    }

    .flat {
      color: var(--muted);
    }

    .badge {
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 3px;
      font-family: 'JetBrains Mono', monospace;
      vertical-align: middle;
      margin-left: 4px;
    }

    .tw {
      background: rgba(0, 153, 255, .15);
      color: var(--accent2);
      border: 1px solid rgba(0, 153, 255, .3);
    }

    .ot {
      background: rgba(255, 179, 64, .12);
      color: var(--warn);
      border: 1px solid rgba(255, 179, 64, .3);
    }

    .empty {
      padding: 60px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    .empty .ic {
      font-size: 28px;
      margin-bottom: 12px;
      opacity: .4;
    }

    .rfooter {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface2);
    }

    .stats {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      display: flex;
      gap: 16px;
    }

    .ok-c {
      color: var(--green);
    }

    .fail-c {
      color: var(--danger);
    }

    .cas {
      display: flex;
      gap: 8px;
    }

    .cb {
      padding: 6px 14px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--dim);
      font-size: 11px;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      transition: all .15s;
    }

    .cb:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .cb.copied {
      border-color: var(--green);
      color: var(--green);
    }

    .pbar {
      height: 2px;
      background: var(--border);
      overflow: hidden;
    }

    .pfill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      width: 0%;
      transition: width .4s;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface);
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 10px 18px;
      border-radius: 6px;
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
      opacity: 0;
      transform: translateY(8px);
      transition: all .2s;
      pointer-events: none;
      z-index: 999;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .ibox {
      margin-top: 12px;
      padding: 12px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.8;
    }

    .ibox .t {
      color: var(--dim);
      font-weight: 600;
      margin-bottom: 6px;
    }

    .w {
      color: var(--warn);
    }

    .note {
      font-size: 10px;
      color: var(--muted);
      padding: 6px 16px 8px;
      font-family: 'JetBrains Mono', monospace;
    }

    .cfg-banner {
      background: rgba(255, 179, 64, .07);
      border: 1px solid rgba(255, 179, 64, .25);
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 20px;
      font-size: 12px;
      line-height: 1.8;
      color: var(--warn);
    }

    .cfg-banner strong {
      color: var(--warn);
      font-size: 13px;
    }

    .cfg-banner code {
      background: var(--surface2);
      padding: 1px 6px;
      border-radius: 3px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent);
      font-size: 12px;
    }

    @media(max-width:640px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- ⚠️ Worker 未設定時顯示 -->
    <div class="cfg-banner" id="cfgBanner">
      ⚙️ <strong>第一次使用設定</strong>：請將下方 <code>WORKER_URL</code> 換成你的 Cloudflare Worker 網址，再存檔推上 GitHub。<br>
      Worker 網址格式：<code>https://你的名稱.workers.dev</code>
    </div>

    <header>
      <h1>台股收盤價</h1>
      <span class="sub">TWSE / OTC</span>
      <div class="date-badge" id="dateDisplay">—</div>
    </header>

    <div class="layout">
      <div>
        <div class="panel">
          <div class="ph"><span class="dot"></span>股票代號</div>
          <textarea id="stockInput"
            placeholder="每行一個代號&#10;例如：&#10;2330&#10;2317&#10;0050&#10;00878&#10;006208"></textarea>
          <div class="ifooter">
            <span class="cnt">共 <span id="inputCount">0</span> 筆</span>
            <div style="display:flex;gap:8px">
              <button class="btn btn-g" onclick="clearAll()">清除</button>
              <button class="btn btn-p" id="fetchBtn" onclick="fetchPrices()">查詢收盤價</button>
            </div>
          </div>
        </div>
        <div class="ibox">
          <div class="t">使用說明</div>
          <div>• 每行輸入一個股票代號</div>
          <div>• 支援上市、上櫃、ETF（含債券 ETF）</div>
          <div>• 資料來源：TWSE / TPEX 官方</div>
          <div class="w" style="margin-top:6px">• 查詢完按「複製收盤價」</div>
          <div class="w">• 直接貼入 Excel 即可</div>
          <div style="margin-top:6px">• 非交易日可能無資料</div>
        </div>
      </div>

      <div class="panel rp">
        <div class="ph"><span class="dot" style="background:var(--accent2)"></span>查詢結果</div>
        <div class="pbar">
          <div class="pfill" id="progressFill"></div>
        </div>
        <div class="sbar" id="statusBar"><span>等待查詢...</span></div>
        <div id="resultsBody">
          <div class="empty">
            <div class="ic">📊</div>
            <div>輸入股票代號後按「查詢收盤價」</div>
          </div>
        </div>
        <div class="rfooter" id="resultsFooter" style="display:none">
          <div class="stats" id="statsDisplay"></div>
          <div class="cas">
            <button class="cb" id="cpBtn" onclick="copyPrices()">複製收盤價</button>
            <button class="cb" id="cbBtn" onclick="copyWithCodes()">複製代號+價格</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ============================================================
    //  ★ 填入你的 Cloudflare Worker 網址（結尾不要加斜線）
    //  例如： https://taiwan-stock-api.yourname.workers.dev
    // ============================================================
    const WORKER_URL = 'https://taiwan-stock.duoduop33.workers.dev';
    // ============================================================

    const isConfigured = !!WORKER_URL && WORKER_URL.startsWith('http');
    if (isConfigured) document.getElementById('cfgBanner').style.display = 'none';

    let twseMap = {}, otcMap = {}, resultsData = [];

    // 顯示今天日期
    document.getElementById('dateDisplay').textContent =
      new Date().toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit' });

    // 輸入框計數
    document.getElementById('stockInput').addEventListener('input', () => {
      document.getElementById('inputCount').textContent = parseInput().length;
    });

    // ✅ 強化版 parseInput：只抓每行開頭第一串英數字當代碼
    function parseInput() {
      return document.getElementById('stockInput').value
        .split('\n')
        .map(line => {
          const trimmed = line.trim();
          if (!trimmed) return '';

          // 行首第一段英數字（支援 00679B 這種格式）
          const m = trimmed.match(/^([0-9A-Z]+)/i);
          return m ? m[1].toUpperCase() : '';
        })
        .filter(code => code.length >= 4);
    }

    function clearAll() {
      document.getElementById('stockInput').value = '';
      document.getElementById('inputCount').textContent = '0';
      document.getElementById('resultsBody').innerHTML =
        '<div class="empty"><div class="ic">📊</div><div>輸入股票代號後按「查詢收盤價」</div></div>';
      document.getElementById('resultsFooter').style.display = 'none';
      document.getElementById('progressFill').style.width = '0%';
      setStatus('等待查詢...');
      resultsData = []; twseMap = {}; otcMap = {};
    }

    function setStatus(msg, loading = false) {
      document.getElementById('statusBar').innerHTML = loading
        ? `<div class="spin"></div><span>${msg}</span>`
        : `<span>${msg}</span>`;
    }

    async function loadTWSE() {
      const resp = await fetch(`${WORKER_URL}/api/twse`);
      const data = await resp.json();
      if (data.error) throw new Error(data.error);
      data.forEach(item => {
        const code = (item.Code || '').trim();
        if (!code) return;
        twseMap[code] = {
          name: (item.Name || code).trim(),
          close: (item.ClosingPrice || '').replace(/,/g, '').trim(),
          change: (item.Change || '0').replace(/,/g, '').trim(),
          source: 'TWSE'
        };
      });
      return Object.keys(twseMap).length;
    }

    async function loadOTC() {
      const resp = await fetch(`${WORKER_URL}/api/otc`);
      const data = await resp.json();
      if (data.error) throw new Error(data.error);

      data.forEach(item => {
        const code = (item.SecuritiesCompanyCode || item.Code || '').trim();
        if (!code) return;

        // Close 可能為 " ---"（未成交），Change 帶 + 號
        const rawClose = (item.Close || item.ClosingPrice || '').replace(/,/g, '').trim();
        const rawChange = (item.Change || '0').replace(/,/g, '').replace(/\+/g, '').trim();

        otcMap[code] = {
          name: (item.CompanyName || item.Name || code).trim(),
          close: rawClose.startsWith('---') || rawClose === '' ? '' : rawClose,
          change: rawChange,
          source: 'OTC'
        };
      });
      return Object.keys(otcMap).length;
    }

    async function fetchPrices() {
      if (!isConfigured) {
        showToast('請先設定 WORKER_URL');
        return;
      }
      const codes = parseInput();
      if (!codes.length) {
        showToast('請先輸入股票代號');
        return;
      }

      document.getElementById('fetchBtn').disabled = true;
      resultsData = []; twseMap = {}; otcMap = {};
      document.getElementById('resultsFooter').style.display = 'none';
      document.getElementById('progressFill').style.width = '10%';
      setStatus('載入上市股票資料...', true);

      let twseCount = 0, otcCount = 0;

      try {
        twseCount = await loadTWSE();
        document.getElementById('progressFill').style.width = '50%';
        setStatus(`上市 ${twseCount} 筆 ✓，載入上櫃資料...`, true);
      } catch (e) {
        setStatus(`上市資料失敗：${e.message}`);
      }

      try {
        otcCount = await loadOTC();
        document.getElementById('progressFill').style.width = '80%';
      } catch (e) {
        // 若櫃買資料抓不到，仍顯示上市結果
        console.error('OTC error:', e);
      }

      if (!twseCount && !otcCount) {
        document.getElementById('resultsBody').innerHTML = `
          <div style="padding:24px 16px;color:var(--danger);font-size:12px;line-height:1.8">
            ❌ 無法取得資料。可能原因：<br>
            • 今日為非交易日 / 盤前<br>
            • Worker 網址設定錯誤<br>
            • TWSE / TPEX API 暫時異常
          </div>`;
        document.getElementById('progressFill').style.width = '0%';
        setStatus('查詢失敗');
        document.getElementById('fetchBtn').disabled = false;
        return;
      }

      resultsData = codes.map(code => {
        const r = twseMap[code] || otcMap[code];
        if (!r || !r.close || r.close === '' || r.close === '--') {
          return { code, ok: false };
        }
        const closeNum = parseFloat(r.close);
        const changeNum = parseFloat(r.change) || 0;
        const prev = closeNum - changeNum;
        const pct = prev ? ((changeNum / prev) * 100).toFixed(2) : '0.00';
        return {
          code,
          ok: true,
          name: r.name,
          close: closeNum.toFixed(2),
          change: changeNum.toFixed(2),
          pct,
          source: r.source
        };
      });

      let ok = 0, fail = 0;
      let html = `<table><thead><tr>
        <th>代號</th><th>名稱</th>
        <th class="r">收盤價</th><th class="r">漲跌</th>
      </tr></thead><tbody>`;

      resultsData.forEach(r => {
        if (r.ok) {
          ok++;
          const up = parseFloat(r.change) > 0;
          const dn = parseFloat(r.change) < 0;
          const cls = up ? 'up' : dn ? 'down' : 'flat';
          const sign = up ? '▲' : dn ? '▼' : '—';
          const bdg = r.source === 'TWSE'
            ? '<span class="badge tw">上市</span>'
            : '<span class="badge ot">上櫃</span>';
          html += `<tr>
            <td class="code">${r.code}</td>
            <td>${r.name}${bdg}</td>
            <td class="price ${cls}">${r.close}</td>
            <td class="chg ${cls}">${sign} ${Math.abs(r.change)} (${r.pct}%)</td>
          </tr>`;
        } else {
          fail++;
          html += `<tr>
            <td class="code">${r.code}</td>
            <td colspan="3" style="color:var(--danger);font-size:12px;">
              查無資料（代號錯誤 / 今日未成交 / 停止買賣）
            </td>
          </tr>`;
        }
      });
      html += `</tbody></table>
        <div class="note">資料來源：台灣證券交易所 / 櫃買中心　上市 ${twseCount} 筆 / 上櫃 ${otcCount} 筆</div>`;

      document.getElementById('resultsBody').innerHTML = html;
      document.getElementById('progressFill').style.width = '100%';
      setStatus(`查詢完成｜${new Date().toLocaleTimeString('zh-TW')}｜共 ${codes.length} 筆`);
      document.getElementById('fetchBtn').disabled = false;
      document.getElementById('statsDisplay').innerHTML =
        `<span class="ok-c">✓ ${ok} 筆成功</span>${fail ? `<span class="fail-c">✗ ${fail} 筆查無資料</span>` : ''}`;
      document.getElementById('resultsFooter').style.display = 'flex';
    }

    function copyPrices() {
      const txt = resultsData.filter(r => r.ok).map(r => r.close).join('\n');
      if (!txt) { showToast('沒有資料'); return; }
      navigator.clipboard.writeText(txt).then(() => {
        showToast(`✓ 已複製 ${resultsData.filter(r => r.ok).length} 筆收盤價，直接貼入 Excel`);
        const b = document.getElementById('cpBtn');
        b.classList.add('copied'); b.textContent = '已複製！';
        setTimeout(() => { b.classList.remove('copied'); b.textContent = '複製收盤價'; }, 2000);
      });
    }

    function copyWithCodes() {
      const txt = resultsData
        .filter(r => r.ok)
        .map(r => `${r.code}\t${r.close}`)
        .join('\n');
      if (!txt) { showToast('沒有資料'); return; }
      navigator.clipboard.writeText(txt).then(() => {
        showToast('✓ 已複製代號+價格（Tab 分隔）');
        const b = document.getElementById('cbBtn');
        b.classList.add('copied'); b.textContent = '已複製！';
        setTimeout(() => { b.classList.remove('copied'); b.textContent = '複製代號+價格'; }, 2000);
      });
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2800);
    }
  </script>
</body>
</html>
